# Key decisions (Goals 1+2)
key_decisions:
  - "Google Maps: must use Places API (New) + Routes API (New) — legacy endpoints not in key's allowed list"
  - "Email auth: confirmation link flow (not OTP). Profile created in _layout.tsx on first confirmed sign-in"
  - "Corridor: origin/dest lat-lng + encoded polyline (routes.polyline.encodedPolyline) + detour_tolerance_km + detour_tolerance_min"
  - "detour_tolerance_min = Math.max(1, Math.round(durationMin * 0.2)); fallback 10 if Routes API fails"
  - "schedule_days as int[] [1..7]; displayed M/Tu/W/Th/F/Sa/Su"
  - "Web output: 'single' (not 'static') — required for Node 20 CORS/WebSocket compatibility"
  - "app.config.js injects EXPO_PUBLIC_GOOGLE_MAPS_API_KEY; app.json stays static"

# Key decisions (Goal 3 spec — locked in spec-goal-3-passenger-ride-discovery.md)
goal_3_decisions:
  - "Matching: client-side point-proximity Haversine — both origin AND dest within detour_tolerance_km of nearest polyline vertex"
  - "No PostGIS, no server-side matching"
  - "No map visualization (deferred per user), no social proof map (deferred), no schedule filter (deferred)"
  - "No driver profile join — route cards show address/time/days/tolerance only; driver name in Goal 4"
  - "New RLS policy on routes: USING (status = 'active' AND driver_id != auth.uid()) — ORed with existing owner policy"
  - "Find Rides tab added as third tab (search-outline icon); placed after Routes tab"

# Key decisions (Goal 4a spec — locked in spec-goal-4a-booking-request-flow.md)
goal_4a_decisions:
  - "Goal 4 split into 4a (booking request), 4b (cancellation), 4c (trusted-pair/deposit)"
  - "username immutability: BEFORE UPDATE trigger raises exception — enforced at DB layer, not app layer"
  - "driver_id on bookings: BEFORE INSERT trigger derives from routes.driver_id server-side — client value ignored (prevents spoofing)"
  - "Partial unique index: UNIQUE(route_id, passenger_id) WHERE status NOT IN ('declined','cancelled') — allows re-request after decline"
  - "confirmed_at: set by BEFORE UPDATE trigger (server now()) not client clock"
  - "respondToBooking guards with .eq('status','pending') — prevents re-overwriting settled bookings"
  - "Booking map built once per search from parallel load — O(1) per-card status lookup"
  - "4th tab: bookings screen (bookmark-outline, My Rides); Driver tab hidden for role=passenger"
  - "Driver view in My Rides shows only status=pending requests; confirmed/declined visible in passenger view"


# Post-Goals 1+2 bug fixes applied during live testing (2026-06-15)
post_goal_fixes:
  - fix: "app.json output changed to 'single' — fixes Node 20 WebSocket crash on npm run web"
    commit: "7dad892"

  - fix: "Google API endpoints migrated from legacy to new versions"
    detail: >
      Places API (New): POST places.googleapis.com/v1/places:autocomplete and
      GET places.googleapis.com/v1/places/{id} with X-Goog-Api-Key header.
      Routes API: POST routes.googleapis.com/directions/v2:computeRoutes.
      routingPreference removed (400 on demo keys). Field mask: routes.polyline
      (not routes.overviewPolyline). Duration parsing: parseInt('1234s') / 60.
    commits: "448846f, bab1ba9, eb0ab20"

  - fix: "Email verification changed from OTP code to confirmation link"
    detail: >
      verify-email.tsx is now a static waiting screen with resend button.
      Profile creation moved to _layout.tsx — fires on first confirmed sign-in
      (email_confirmed_at set, no profile row). email_confirmed_at guard prevents
      unconfirmed sessions from advancing past verify-email.
    commit: "cc3c159"

  - fix: "role.tsx upsert includes username+phone from user_metadata"
    detail: >
      Prevents NOT NULL violation on username when profile row is absent at role
      selection time (e.g. user registered before _layout.tsx profile-creation
      logic was deployed).
    commit: "2c71988"

  - fix: "Dev user seed corrected — dashboard-only password creation required"
    detail: >
      PostgreSQL crypt() produces $2a$ bcrypt; Supabase Auth requires $2b$.
      Seed script now only inserts the profile row. User must be created via
      Supabase dashboard: Authentication → Users → Add user → Auto Confirm User.
      Credentials: dev@commuteshare.local / Dev1234! (role: both).
      Login screen shows amber Dev Login button in __DEV__ mode.
    commit: "dbbb969"


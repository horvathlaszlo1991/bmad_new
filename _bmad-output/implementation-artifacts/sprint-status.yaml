# Key Goal 2 design decisions
goal_2_decisions:
  - "Corridor stored as: origin/dest lat-lng + encoded Google Directions overview_polyline + detour_tolerance_km (spatial) + detour_tolerance_min (temporal)"
  - "detour_tolerance_min default = Math.max(1, Math.round(durationMin * 0.2)); fallback 10 if Directions API fails"
  - "schedule_days stored as int[] [1..7] (1=Mon, 7=Sun); displayed as M/Tu/W/Th/F/Sa/Su"
  - "Cross-platform autocomplete via HTTP fetch to Places API (not native library)"
  - "MapView gated behind Platform.OS !== 'web'; web shows text fallback"
  - "Soft-delete pattern: deleteRoute sets status='deleted'; queries filter .neq('status','deleted')"

